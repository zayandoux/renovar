<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Renovar Assinatura</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom right, #002c46, #01263a);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background-color: white;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      padding: 40px 20px;
      text-align: center;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      color: #000;
    }

    .logo {
      max-width: 120px;
      margin-bottom: 20px;
    }

    input[type="text"] {
      width: 80%;
      padding: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 20px;
      background-color: #f5f5f5;
    }

    .btn-acessar {
      width: 80%;
      padding: 15px;
      background-color: #000;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
    }

    .btn-renovar {
      width: 80%;
      padding: 15px;
      background-color: #00796b;
      color: white;
      font-size: 16px;
      border-radius: 30px;
      margin-top: 20px;
      display: inline-block;
      text-decoration: none;
    }

    .mensagem-erro {
      color: red;
      margin-top: 20px;
    }

    .nome-usuario {
      font-weight: bold;
      font-size: 16px;
      margin-top: 20px;
      color: green;
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="logo_sem_fundo.png" alt="Logo" class="logo" />
    <h2>Renovar Assinatura</h2>
    <p>Digite seu telefone para continuar</p>

    <input type="text" id="telefone" placeholder="(00)00000-0000" maxlength="15" oninput="mascaraTelefone(this)" />
    
    <button class="btn-acessar" id="botaoAcessar" onclick="mostrarLink()" disabled>
      Acessar
    </button>

    <div id="resultado"></div>
  </div>

  <script>
    const dados = {
      "12988473131": ["Marcos Vinícius", "https://bruxplay.top/#/checkout/231qAP214q/RXDgKVKoDe"],
      "12997455589": ["Alexia Fernandes de Carvalho", "https://bruxplay.top/#/checkout/231qAP214q/ywDmKx0J1p"]
    };

    document.getElementById("telefone").addEventListener("input", function () {
      const valor = this.value.replace(/\D/g, '');
      document.getElementById("botaoAcessar").disabled = valor.length < 10;
    });

    function mascaraTelefone(input) {
      let valor = input.value.replace(/\D/g, '');

      if (valor.length > 10) {
        valor = valor.replace(/(\d{2})(\d{5})(\d{4})/, '($1)$2-$3');
      } else {
        valor = valor.replace(/(\d{2})(\d{4})(\d{4})/, '($1)$2-$3');
      }

      input.value = valor;
    }

    function mostrarLink() {
      const telefone = document.getElementById("telefone").value.replace(/\D/g, '');
      const resultado = document.getElementById("resultado");

      if (dados[telefone]) {
        const nome = dados[telefone][0];
        const link = dados[telefone][1];

        resultado.innerHTML = `
          <p class="nome-usuario">Olá, ${nome} 👋</p>
          <a href="${link}" target="_blank" class="btn-renovar">
            Renovar Assinatura
          </a>
        `;
      } else {
        resultado.innerHTML = `
          <p class="mensagem-erro">
            Número não encontrado. Verifique ou entre em contato com o suporte.
          </p>
        `;
      }
    }
  </script>
</body>
</html>
