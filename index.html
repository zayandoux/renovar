<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#202124;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.logo{
    font-size:48px;
    font-weight:500;
    margin-bottom:30px;
}

.logo span:nth-child(1){color:#4285F4;}
.logo span:nth-child(2){color:#EA4335;}
.logo span:nth-child(3){color:#FBBC05;}
.logo span:nth-child(4){color:#4285F4;}
.logo span:nth-child(5){color:#34A853;}
.logo span:nth-child(6){color:#EA4335;}

.search-box{
    width:90%;
    max-width:500px;
    background:#303134;
    border-radius:30px;
    padding:12px 20px;
    display:flex;
    align-items:center;
}

.search-box input{
    flex:1;
    background:none;
    border:none;
    outline:none;
    color:white;
    font-size:16px;
}

.search-btn{
    margin-top:20px;
}

button{
    background:#303134;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="logo">
<span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
</div>

<div class="search-box">
<input id="search" type="text" placeholder="Pesquisar no Google">
</div>

<div class="search-btn">
<button onclick="buscar()">Pesquisa Google</button>
</div>

<script>
function buscar(){
    let texto = document.getElementById("search").value.toLowerCase();

    if(texto.includes("instagram") || texto.includes("homens bonitos")){
        window.location.href="https://www.instagram.com/zayandoux/";
    }else{
        window.location.href="https://www.instagram.com/zayandoux/";
    }
}

document.getElementById("search").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        buscar();
    }
});
</script>

</body>
</html>
